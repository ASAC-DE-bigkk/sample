elt_smoke:
  target: prod
  outputs:
    prod:
      type: trino
      method: none
      user: "{{ env_var('TRINO_USER', 'airflow') }}"
      host: "{{ env_var('TRINO_HOST', 'trino') }}"
      port: "{{ env_var('TRINO_PORT', '8080') | int }}"
      database: "{{ env_var('TRINO_ICEBERG_CATALOG', 'iceberg') }}"
      schema: "{{ env_var('SMOKE_SCHEMA', 'ops_smoke') }}"
      threads: 1
      http_scheme: http
