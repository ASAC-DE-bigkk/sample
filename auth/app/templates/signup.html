{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block body %}
<h1>회원가입</h1>
{% if error %}<p class="err">{{ error }}</p>{% endif %}
<form method="post" action="/signup">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <label>이메일<input type="email" name="email" required autocomplete="email"></label>
  <label>비밀번호(10자 이상, 영문·숫자 포함)
    <input type="password" name="password" required autocomplete="new-password" minlength="10"></label>
  <button type="submit">가입하고 인증 메일 받기</button>
</form>
<p><a href="/login">이미 계정이 있으신가요? 로그인</a></p>
{% endblock %}
